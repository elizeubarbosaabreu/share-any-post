<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #eee;
      padding: 16px;
    }
    h1 { font-size: 14px; text-align: center; margin-bottom: 4px; color: #7c3aed; }
    .subtitle { text-align: center; font-size: 11px; color: #666; margin-bottom: 12px; }
    .status { text-align: center; font-size: 11px; color: #aaa; margin-top: 8px; min-height: 16px; }
    .error { color: #ef4444; }
    #postCard {
      display: none; background: #1a1a2e; border-radius: 8px;
      padding: 12px; margin-top: 10px;
    }
    .post-info { display: flex; flex-direction: column; gap: 8px; }
    .img-nav { display: none; position: relative; }
    .img-nav .post-thumb { width: 100%; max-height: 120px; object-fit: contain; border-radius: 6px; background: #fff; }
    .img-nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.6); color: #fff; border: none;
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      font-size: 16px; font-weight: 700; display: none; z-index: 2;
    }
    .img-nav-arrow:hover { background: rgba(124,58,237,0.8); }
    .img-nav-arrow.left { left: 4px; }
    .img-nav-arrow.right { right: 4px; }
    .img-nav-counter {
      text-align: center; font-size: 10px; color: #888; margin-top: 4px; display: none;
    }
    .post-title {
      font-size: 12px; line-height: 1.3; color: #ccc;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-url {
      font-size: 10px; color: #666; word-break: break-all;
      max-height: 30px; overflow: hidden;
    }
    .btn {
      width: 100%; padding: 10px; margin-top: 10px; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn-generate { background: #7c3aed; color: #fff; display: none; }
    .btn-download { background: #1e40af; color: #fff; display: none; }
    .btn-copy { background: #6b21a8; color: #fff; display: none; }
    .preview { width: 100%; margin-top: 10px; border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <h1>Share Any Post</h1>
  <p class="subtitle">Compartilhe qualquer postagem</p>
  <div id="postCard">
    <div class="img-nav" id="imgNav">
      <button class="img-nav-arrow left" id="imgPrev">&#8249;</button>
      <button class="img-nav-arrow right" id="imgNext">&#8250;</button>
      <img class="post-thumb" id="imgThumb">
      <div class="img-nav-counter" id="imgCounter"></div>
    </div>
  </div>
  <button class="btn btn-generate" id="generateBtn">Gerar Story 9:16</button>
  <img class="preview" id="preview">
  <button class="btn btn-download" id="downloadBtn">Baixar Imagem</button>
  <button class="btn btn-copy" id="copyBtn">Copiar Texto</button>
  <div class="status" id="status"></div>
  <canvas id="canvas" style="display:none"></canvas>
  <script src="qrcode.js"></script>
  <script src="popup.js"></script>
</body>
</html>
